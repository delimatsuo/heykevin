# .claude/deploy-config.yaml
# Generated by /deploy-setup — consumed by /deploy-staging and /promote-production
# Do not delete — /deploy relies on this file for project-specific values.

schema_version: 1

project:
  name: kevin
  platform: cloud-run
  gcp_region: us-central1
  cloud_run_service: kevin-api
  github_repo: https://github.com/delimatsuo/heykevin

environments:
  staging:
    branch: staging
    url: https://kevin-api-staging-752910912062.us-central1.run.app
    cloud_run_service: kevin-api-staging
    gcp_project_id: kevin-491315
    health_check: /health
  production:
    branch: main
    url: https://kevin-api-752910912062.us-central1.run.app
    cloud_run_service: kevin-api
    gcp_project_id: kevin-491315
    health_check: /health

ci_cd:
  provider: github-actions
  deploy_workflow: .github/workflows/deploy.yml
  rollback_workflow: .github/workflows/rollback.yml
  auth_method: workload-identity-federation
  wif_provider: projects/752910912062/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  wif_service_account: github-actions@kevin-491315.iam.gserviceaccount.com

reviewer:
  tech_stack: Python 3.12, FastAPI, Cloud Run, Firestore, Firebase, Twilio, iOS Swift/SwiftUI, StoreKit 2
  additional_rules: >
    This is a billing-critical app with StoreKit 2 subscriptions and Twilio call routing.
    Flag any changes to subscription verification, call routing logic, or PROTECTED_FIELDS.
    Fail open on subscription checks (never break paying users).
    All subscription fields must go through the verify endpoint, never client PATCH.
