# Generated by /deploy-setup — starter template, review TODOs before use
# Deploys kevin-api to Cloud Run on push to staging or main

name: Deploy

on:
  push:
    branches: [staging, main]

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: kevin-491315
  GCP_REGION: us-central1
  STAGING_SERVICE: kevin-api-staging
  PRODUCTION_SERVICE: kevin-api

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      # TODO: Configure Workload Identity Federation in GCP Console first.
      # See: https://cloud.google.com/blog/products/identity-security/enabling-keyless-authentication-from-github-actions
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy $STAGING_SERVICE \
            --source . \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --tag staging

      - name: Health check
        run: |
          sleep 15
          STAGING_URL=$(gcloud run services describe $STAGING_SERVICE \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --format='value(status.url)')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
          echo "Staging health: HTTP $STATUS at $STAGING_URL"
          [ "$STATUS" = "200" ] || exit 1

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy $PRODUCTION_SERVICE \
            --source . \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --allow-unauthenticated

      - name: Health check
        run: |
          sleep 15
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            "https://kevin-api-752910912062.us-central1.run.app/health" || echo "000")
          echo "Production health: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
