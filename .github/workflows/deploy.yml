# Deploys staging automatically. Production deploys are manual releases from main.

name: Deploy

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging, main]
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to deploy'
        required: true
        type: choice
        options: [staging, production]

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: kevin-491315
  GCP_REGION: us-central1
  STAGING_SERVICE: kevin-api-staging
  STAGING_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
  PRODUCTION_SERVICE: kevin-api
  PRODUCTION_URL: https://kevin-api-752910912062.us-central1.run.app

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/staging' && ((github.event_name == 'push') || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')) }}
    environment: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Check staging isolation variables
        run: |
          test -n "${{ vars.STAGING_RUNTIME_SERVICE_ACCOUNT }}" || (echo "Missing staging STAGING_RUNTIME_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ vars.STAGING_BUILD_SERVICE_ACCOUNT }}" || (echo "Missing staging STAGING_BUILD_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ vars.FIRESTORE_PROJECT_ID }}" || (echo "Missing staging FIRESTORE_PROJECT_ID" && exit 1)
          test "${{ vars.FIRESTORE_PROJECT_ID }}" != "$GCP_PROJECT_ID" || (echo "Staging must not use production Firestore project" && exit 1)
          test -n "${{ vars.FIREBASE_DATABASE_URL }}" || (echo "Missing staging FIREBASE_DATABASE_URL" && exit 1)
          case "${{ vars.FIREBASE_DATABASE_URL }}" in
            *kevin-491315-rtdb*) echo "Staging must not use production RTDB" && exit 1 ;;
          esac
          test -n "${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }}" || (echo "Missing staging PRODUCTION_TWILIO_ACCOUNT_SID" && exit 1)

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy $STAGING_SERVICE \
            --source . \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --service-account ${{ vars.STAGING_RUNTIME_SERVICE_ACCOUNT }} \
            --build-service-account ${{ vars.STAGING_BUILD_SERVICE_ACCOUNT }} \
            --update-env-vars ENVIRONMENT=staging,APPSTORE_ENVIRONMENT=sandbox,CLOUD_RUN_URL=$STAGING_URL,FIRESTORE_PROJECT_ID=${{ vars.FIRESTORE_PROJECT_ID }},FIREBASE_DATABASE_URL=${{ vars.FIREBASE_DATABASE_URL }},APNS_SANDBOX=${{ vars.APNS_SANDBOX || 'false' }},PRODUCTION_TWILIO_ACCOUNT_SID=${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }} \
            --tag staging

      - name: Health check
        run: |
          sleep 15
          STAGING_URL=$(gcloud run services describe $STAGING_SERVICE \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --format='value(status.url)')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/health" || echo "000")
          echo "Staging health: HTTP $STATUS at $STAGING_URL"
          [ "$STATUS" = "200" ] || exit 1

  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'production' && github.ref == 'refs/heads/main'
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Refuse non-main production deploy
        run: |
          test "$GITHUB_REF" = "refs/heads/main" || (echo "Production deploys must run from main" && exit 1)

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_PRODUCTION_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Check production runtime variables
        run: |
          test -n "${{ vars.PRODUCTION_RUNTIME_SERVICE_ACCOUNT }}" || (echo "Missing production PRODUCTION_RUNTIME_SERVICE_ACCOUNT" && exit 1)
          test -n "${{ vars.PRODUCTION_BUILD_SERVICE_ACCOUNT }}" || (echo "Missing production PRODUCTION_BUILD_SERVICE_ACCOUNT" && exit 1)

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy $PRODUCTION_SERVICE \
            --source . \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --service-account ${{ vars.PRODUCTION_RUNTIME_SERVICE_ACCOUNT }} \
            --build-service-account ${{ vars.PRODUCTION_BUILD_SERVICE_ACCOUNT }} \
            --update-env-vars ENVIRONMENT=production,APPSTORE_ENVIRONMENT=production,CLOUD_RUN_URL=$PRODUCTION_URL,FIRESTORE_PROJECT_ID=$GCP_PROJECT_ID,FIREBASE_DATABASE_URL=https://kevin-491315-rtdb.firebaseio.com,APNS_SANDBOX=false,PRODUCTION_TWILIO_ACCOUNT_SID=${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }}

      - name: Health check
        run: |
          sleep 15
          PROD_URL=$(gcloud run services describe $PRODUCTION_SERVICE \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --format='value(status.url)')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$PROD_URL/health" || echo "000")
          echo "Production health: HTTP $STATUS at $PROD_URL"
          [ "$STATUS" = "200" ] || exit 1
