# Generated by /deploy-setup — starter template, review TODOs before use
# Manual rollback workflow for Cloud Run traffic splitting or revision revert

name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to rollback'
        required: true
        type: choice
        options: [staging, production]
      method:
        description: 'Rollback method'
        required: true
        type: choice
        options: [traffic-split, redeploy-tag]
      revision_or_tag:
        description: 'Cloud Run revision (e.g. kevin-api-00150-abc) or git tag (e.g. staging-2026-04-08-pre-abc1234)'
        required: true
        type: string
      confirm_production:
        description: 'For production rollbacks, type production'
        required: false
        type: string

permissions:
  id-token: write
  contents: read

env:
  GCP_PROJECT_ID: kevin-491315
  GCP_REGION: us-central1

jobs:
  rollback:
    name: Rollback ${{ inputs.environment }} via ${{ inputs.method }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Confirm production rollback
        if: inputs.environment == 'production'
        run: |
          test "${{ inputs.confirm_production }}" = "production" || (echo "Type production in confirm_production to rollback production" && exit 1)

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ inputs.environment == 'production' && vars.WIF_PRODUCTION_SERVICE_ACCOUNT || vars.WIF_STAGING_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set service name
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "SERVICE=kevin-api-staging" >> $GITHUB_ENV
          else
            echo "SERVICE=kevin-api" >> $GITHUB_ENV
          fi

      - name: Rollback via traffic split
        if: inputs.method == 'traffic-split'
        run: |
          echo "Rolling back $SERVICE to revision: ${{ inputs.revision_or_tag }}"
          gcloud run services update-traffic $SERVICE \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --to-revisions=${{ inputs.revision_or_tag }}=100

      - name: Rollback via git tag redeploy
        if: inputs.method == 'redeploy-tag'
        run: |
          echo "Redeploying from git tag: ${{ inputs.revision_or_tag }}"
          git checkout ${{ inputs.revision_or_tag }}
          if [ "${{ inputs.environment }}" = "staging" ]; then
            test -n "${{ vars.FIRESTORE_PROJECT_ID }}" || (echo "Missing staging FIRESTORE_PROJECT_ID" && exit 1)
            test "${{ vars.FIRESTORE_PROJECT_ID }}" != "$GCP_PROJECT_ID" || (echo "Staging must not use production Firestore project" && exit 1)
            test -n "${{ vars.FIREBASE_DATABASE_URL }}" || (echo "Missing staging FIREBASE_DATABASE_URL" && exit 1)
            case "${{ vars.FIREBASE_DATABASE_URL }}" in
              *kevin-491315-rtdb*) echo "Staging must not use production RTDB" && exit 1 ;;
            esac
            test -n "${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }}" || (echo "Missing staging PRODUCTION_TWILIO_ACCOUNT_SID" && exit 1)
            ENV_VARS="ENVIRONMENT=staging,APPSTORE_ENVIRONMENT=sandbox,CLOUD_RUN_URL=https://kevin-api-staging-l63rergg7a-uc.a.run.app,FIRESTORE_PROJECT_ID=${{ vars.FIRESTORE_PROJECT_ID }},FIREBASE_DATABASE_URL=${{ vars.FIREBASE_DATABASE_URL }},APNS_SANDBOX=${{ vars.APNS_SANDBOX || 'false' }},PRODUCTION_TWILIO_ACCOUNT_SID=${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }}"
          else
            ENV_VARS="ENVIRONMENT=production,APPSTORE_ENVIRONMENT=production,CLOUD_RUN_URL=https://kevin-api-752910912062.us-central1.run.app,FIRESTORE_PROJECT_ID=$GCP_PROJECT_ID,FIREBASE_DATABASE_URL=https://kevin-491315-rtdb.firebaseio.com,APNS_SANDBOX=false,PRODUCTION_TWILIO_ACCOUNT_SID=${{ vars.PRODUCTION_TWILIO_ACCOUNT_SID }}"
          fi
          gcloud run deploy $SERVICE \
            --source . \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --allow-unauthenticated \
            --update-env-vars "$ENV_VARS"

      - name: Health check after rollback
        run: |
          sleep 15
          URL=$(gcloud run services describe $SERVICE \
            --project $GCP_PROJECT_ID \
            --region $GCP_REGION \
            --format='value(status.url)')
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
          echo "Post-rollback health: HTTP $STATUS at $URL"
          [ "$STATUS" = "200" ] || (echo "Health check FAILED after rollback!" && exit 1)
