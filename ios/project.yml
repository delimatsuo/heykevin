name: Kevin
options:
  bundleIdPrefix: com.kevin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  knownRegions:
    - en
    - es
    - pt-BR

packages:
  TwilioVoice:
    url: https://github.com/twilio/twilio-voice-ios
    from: "6.11.0"

# Build configurations: Debug → staging backend, Staging → staging backend, Release → production
configs:
  Debug: debug
  Staging: release
  Release: release

targets:
  Kevin:
    type: application
    platform: iOS
    sources:
      - Kevin
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.callscreen
        SWIFT_EMIT_LOC_STRINGS: true
        MARKETING_VERSION: "1.2.2"
        CURRENT_PROJECT_VERSION: "13"
        DEVELOPMENT_TEAM: 3FLG8W6B95
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: false
        ENABLE_PREVIEWS: false
        APP_ENV: staging
        BACKEND_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
      configs:
        Debug:
          APP_ENV: staging
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG STAGING
          BACKEND_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
        Staging:
          SWIFT_OPTIMIZATION_LEVEL: -O
          ENABLE_DEBUG_DYLIB: false
          APP_ENV: staging
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: STAGING
          BACKEND_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          ENABLE_DEBUG_DYLIB: false
          APP_ENV: production
          BACKEND_URL: https://kevin-api-752910912062.us-central1.run.app
    dependencies:
      - package: TwilioVoice
    entitlements:
      path: Kevin/Kevin.entitlements
      properties:
        aps-environment: production
        com.apple.developer.applesignin:
          - Default
    info:
      path: Kevin/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIBackgroundModes:
          - remote-notification
          - voip
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSContactsUsageDescription: "Hey Kevin uploads your contacts to our secure server so Kevin can recognize your callers by name and ring trusted contacts through directly without AI screening. Contacts are used only for this purpose, are never shared or sold, and are deleted if you remove your account."
        NSMicrophoneUsageDescription: "Kevin needs microphone access to connect you with callers and record voice training."
        NSSpeechRecognitionUsageDescription: "Kevin uses speech recognition to learn about your business from your voice."
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        BackendURL: $(BACKEND_URL)
        AppEnvironment: $(APP_ENV)

schemes:
  Kevin:
    build:
      targets:
        Kevin: all
    run:
      config: Debug
      storeKitConfiguration: Kevin/Products.storekit
    test:
      config: Debug
      targets: []
    profile:
      config: Staging
    analyze:
      config: Debug
    archive:
      config: Release
  Kevin Staging:
    build:
      targets:
        Kevin: all
    run:
      config: Staging
      storeKitConfiguration: Kevin/Products.storekit
    test:
      config: Staging
      targets: []
    profile:
      config: Staging
    analyze:
      config: Staging
    archive:
      config: Staging
