name: Kevin
options:
  bundleIdPrefix: com.kevin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  knownRegions:
    - en
    - es
    - pt-BR

packages:
  TwilioVoice:
    url: https://github.com/twilio/twilio-voice-ios
    from: "6.11.0"

# Build configurations: Debug → staging backend, Staging → staging backend (TestFlight), Release → production
configs:
  Debug: debug
  Staging: release
  Release: release

targets:
  Kevin:
    type: application
    platform: iOS
    sources:
      - Kevin
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.kevin.callscreen
        SWIFT_EMIT_LOC_STRINGS: true
        MARKETING_VERSION: "1.2.0"
        CURRENT_PROJECT_VERSION: "10"
        DEVELOPMENT_TEAM: 3FLG8W6B95
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: false
        ENABLE_PREVIEWS: false
        BACKEND_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
      configs:
        Staging:
          SWIFT_OPTIMIZATION_LEVEL: -O
          ENABLE_DEBUG_DYLIB: false
          BACKEND_URL: https://kevin-api-staging-l63rergg7a-uc.a.run.app
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          ENABLE_DEBUG_DYLIB: false
          BACKEND_URL: https://kevin-api-752910912062.us-central1.run.app
    dependencies:
      - package: TwilioVoice
    scheme:
      testTargets: []
      storeKitConfiguration: Kevin/Products.storekit
      buildConfigs:
        run: Debug
        test: Debug
        profile: Staging
        analyze: Staging
        archive: Release
    entitlements:
      path: Kevin/Kevin.entitlements
      properties:
        aps-environment: production
        com.apple.developer.applesignin:
          - Default
    info:
      path: Kevin/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
          - voip
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSContactsUsageDescription: "Kevin needs access to your contacts to add VIP numbers that ring through without screening."
        NSMicrophoneUsageDescription: "Kevin needs microphone access to connect you with callers and record voice training."
        NSSpeechRecognitionUsageDescription: "Kevin uses speech recognition to learn about your business from your voice."
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UILaunchScreen: {}
        BackendURL: $(BACKEND_URL)
